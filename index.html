  <style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  letter-spacing: 1px;
}

.search-container {
  position: sticky;
  top: 0;
  background: rgba(15, 23, 42, 0.9);
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  z-index: 10;
}

input {
  width: 90%;
  max-width: 450px;
  padding: 12px 15px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.4s;
  border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-8px) scale(1.05);
  box-shadow: 0 15px 25px rgba(0,0,0,0.4);
  background: rgba(255,255,255,0.08);
}

.card img {
  width: 100%;
  height: 90px;
  object-fit: contain;
  margin-bottom: 10px;
}

.card h4 {
  margin: 5px 0;
  font-size: 14px;
  font-weight: 500;
}

.group {
  display: inline-block;
  padding: 3px 8px;
  font-size: 11px;
  border-radius: 20px;
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  margin-top: 5px;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.modal button {
  margin-top: 15px;
  padding: 8px 15px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

@media(max-width: 500px){
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  }
}
</style>
 </head>

    <h3 id="modalTitle"></h3>
    <p style="font-size:12px; word-break: break-all;" id="modalUrl"></p>
    <button onclick="closeModal()">Close</button>
   </div>
  </div>
